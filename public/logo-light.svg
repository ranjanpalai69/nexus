<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="60" x2="60" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF5C00"/>
      <stop offset="33%"  stop-color="#E91E8C"/>
      <stop offset="66%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <path d="M 10 50 L 10 10 L 50 50 L 50 10"
        stroke="url(#lg)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Wordmark: dark for light backgrounds -->
  <text x="72" y="42"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26"
        font-weight="900"
        letter-spacing="6"
        fill="#0F0A1E">NEXUS</text>
</svg>
