<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F0A1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      height: 44px;
      width: auto;
      margin: 0 auto 2.5rem;
      display: block;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(233,30,140,.15), rgba(147,51,234,.15));
      border: 1px solid rgba(147,51,234,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrap svg { width: 36px; height: 36px; stroke: #c084fc; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .625rem;
      background: linear-gradient(135deg, #FF5C00, #E91E8C, #9333EA, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #94a3b8;
      font-size: .9375rem;
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: linear-gradient(135deg, #E91E8C, #9333EA, #06B6D4);
      color: #fff;
      border: none;
      padding: .75rem 2rem;
      border-radius: .75rem;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .9; }
    .note {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/Nexus-White.png" alt="Nexus" class="logo" />
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Cached pages and media may still be available.</p>
    <button class="btn" onclick="window.location.reload()">
      ↺ Try again
    </button>
    <p class="note">Nexus will reconnect automatically when you're back online.</p>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload())
  </script>
</body>
</html>
