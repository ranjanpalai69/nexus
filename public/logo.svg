<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="nGrad" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF5C00"/>
      <stop offset="33%"  stop-color="#E91E8C"/>
      <stop offset="66%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background for icon-only usage (dark) -->
  <rect width="200" height="200" rx="40" fill="#0F0A1E"/>
  <!-- N strokes: bottom-left → top-left → bottom-right → top-right -->
  <path d="M 44 164 L 44 36 L 156 164 L 156 36"
        stroke="url(#nGrad)"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>
